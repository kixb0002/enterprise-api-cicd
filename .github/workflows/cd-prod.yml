# Nom affiche dans l'onglet Actions de GitHub.
name: CD - Blue Green Production

# Definit les evenements qui declenchent le workflow.
on:
  # Permet de lancer le workflow manuellement depuis GitHub Actions.
  workflow_dispatch:
    # Parametres demandes au lancement manuel.
    inputs:
      # Tag de l'image Docker a deployer.
      image_tag:
        # Description affichee dans l'interface GitHub.
        description: "Image tag to deploy, usually GitHub SHA"
        # Rend le parametre obligatoire.
        required: true
        # Type de la valeur attendue.
        type: string

  # Permet de lancer le CD automatiquement apres le CI.
  workflow_run:
    # Nom exact du workflow CI qui doit declencher le CD.
    workflows: ["CI - Build Test Security Package"]
    # Declenche le CD quand le CI est termine.
    types:
      - completed
    # Ne declenche automatiquement le CD que pour les runs CI de main.
    branches:
      - main

# Permissions donnees au token GitHub Actions.
permissions:
  # Autorise la lecture du contenu du depot.
  contents: read
  # Autorise l'authentification OIDC vers Azure.
  id-token: write

# Variables d'environnement disponibles dans tout le workflow.
env:
  # Nom de l'image Docker a deployer.
  IMAGE_NAME: "enterprise-api"

# Liste des jobs du workflow.
jobs:
  # Job sans environnement production qui decide si le deploiement doit continuer.
  prepare-deployment:
    # Execute le job sur un runner Linux fourni par GitHub.
    runs-on: ubuntu-latest
    # Expose les informations calculees aux jobs suivants.
    outputs:
      should_deploy: ${{ steps.decision.outputs.should_deploy }}
      image_tag: ${{ steps.decision.outputs.image_tag }}

    # Liste des etapes du job.
    steps:
      # Determine si le CD doit continuer et quel tag d'image deployer.
      - name: Decide deployment source
        id: decision
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event.workflow_run.conclusion }}" = "success" ] && [ "${{ github.event.workflow_run.head_branch }}" = "main" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          echo "image_tag=" >> "$GITHUB_OUTPUT"

  # Job qui deploie sur le slot green puis fait le swap vers production.
  deploy-green-and-swap:
    # Attend le job de preparation avant d'entrer dans l'environnement production.
    needs: prepare-deployment
    # Lance le deploiement uniquement si le job de preparation l'autorise.
    if: needs.prepare-deployment.outputs.should_deploy == 'true'
    # Execute le job sur un runner Linux fourni par GitHub.
    runs-on: ubuntu-latest
    # Associe le job a l'environnement GitHub production.
    environment: production

    # Liste des etapes du job.
    steps:
      # Connexion a Azure avec OIDC.
      - name: Azure login with OIDC
        # Utilise l'action officielle Azure login.
        uses: azure/login@v2
        # Parametres de connexion Azure.
        with:
          # Client ID de l'App Registration GitHub OIDC.
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          # Tenant ID Azure.
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          # Subscription ID Azure.
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Configure le slot green pour utiliser l'image Docker choisie.
      - name: Deploy image to green slot
        # Met a jour l'image du conteneur sur le slot green.
        run: |
          az webapp config container set \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --name ${{ vars.APP_NAME }} \
            --slot ${{ vars.SLOT_NAME }} \
            --container-image-name ${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.prepare-deployment.outputs.image_tag }} \
            --container-registry-url https://${{ vars.ACR_LOGIN_SERVER }}

      # Redemarre le slot green apres changement d'image.
      - name: Restart green slot
        # Force App Service a redemarrer le conteneur du slot green.
        run: |
          az webapp restart \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --name ${{ vars.APP_NAME }} \
            --slot ${{ vars.SLOT_NAME }}

      # Verifie que le slot green est pret avant le swap.
      - name: Warm-up green slot
        # Attend le demarrage puis teste les endpoints critiques.
        run: |
          sleep 30
          curl -f https://${{ vars.APP_NAME }}-${{ vars.SLOT_NAME }}.azurewebsites.net/health
          curl -f https://${{ vars.APP_NAME }}-${{ vars.SLOT_NAME }}.azurewebsites.net/ready
          curl -f https://${{ vars.APP_NAME }}-${{ vars.SLOT_NAME }}.azurewebsites.net/version

      # Echange le slot green avec la production.
      - name: Swap green to production
        # Promeut le slot green en production.
        run: |
          az webapp deployment slot swap \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --name ${{ vars.APP_NAME }} \
            --slot ${{ vars.SLOT_NAME }} \
            --target-slot production

      # Valide que la production fonctionne apres le swap.
      - name: Post-deployment validation
        # Attend la stabilisation puis teste les endpoints de production.
        run: |
          sleep 20
          curl -f https://${{ vars.APP_NAME }}.azurewebsites.net/health
          curl -f https://${{ vars.APP_NAME }}.azurewebsites.net/ready
          curl -f https://${{ vars.APP_NAME }}.azurewebsites.net/version
